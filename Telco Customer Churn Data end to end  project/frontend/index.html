<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Churn Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Customer Churn Prediction</h2>

        <input type="number" id="age" placeholder="Age">

        <select id="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <input type="number" id="tenure" placeholder="Tenure">

        <input type="number" id="monthlyCharges" placeholder="Monthly Charges">

        <input type="number" id="totalCharges" placeholder="Total Charges">

        <select id="contract">
            <option value="">Select Contract</option>
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
        </select>

        <select id="paymentMethod">
            <option value="">Select Payment Method</option>
            <option value="Electronic check">Electronic check</option>
            <option value="Mailed check">Mailed check</option>
            <option value="Bank transfer">Bank transfer</option>
            <option value="Credit card">Credit card</option>
        </select>

        <button onclick="predictChurn()">Predict</button>

        <div class="result" id="result"></div>

    </div>

    <script>

        async function predictChurn() {

            const data = {
                Age: parseFloat(document.getElementById("age").value),
                Gender: document.getElementById("gender").value,
                Tenure: parseFloat(document.getElementById("tenure").value),
                MonthlyCharges: parseFloat(document.getElementById("monthlyCharges").value),
                TotalCharges: parseFloat(document.getElementById("totalCharges").value),
                Contract: document.getElementById("contract").value,
                PaymentMethod: document.getElementById("paymentMethod").value
            };

            try {

                const response = await fetch("http://customerchurn-env.eba-xq3iqpvz.ap-south-1.elasticbeanstalk.com/predict", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": "12345SECRET"
                    },

                    body: JSON.stringify(data)
                });

                const result = await response.json();

                document.getElementById("result").innerHTML = `
            <h3>Prediction Result</h3>
            <p><strong>Churn:</strong> ${result.churn_prediction}</p>
            <p><strong>Prediction Value:</strong> ${result.prediction_value}</p>
            <p><strong>Probability:</strong> ${result.churn_probability}</p>
        `;

            } catch (error) {

                document.getElementById("result").innerHTML = `
            <p style="color:red;">Error connecting to API</p>
        `;

                console.log(error);
            }
        }

    </script>

</body>

</html>
